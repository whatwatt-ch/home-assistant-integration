name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check custom_components/ tests/

  hacs-validation:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=custom_components/whatwatt --cov-report=term-missing --cov-fail-under=80

  e2e-tests:
    name: E2E Tests (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        ha-version: ["stable", "2025.1", "2024.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set HA image version
        run: |
          sed -i "s|ghcr.io/home-assistant/home-assistant:stable|ghcr.io/home-assistant/home-assistant:${{ matrix.ha-version }}|" e2e/docker-compose.yml

      - name: Start services
        run: docker compose -f e2e/docker-compose.yml up -d

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install E2E dependencies
        run: pip install -r e2e/requirements.txt

      - name: Wait for Home Assistant
        run: |
          echo "Waiting for Home Assistant to start..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8123/api/onboarding > /dev/null 2>&1; then
              echo "Home Assistant is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Home Assistant failed to start"
          docker compose -f e2e/docker-compose.yml logs homeassistant
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        run: python -m pytest test_e2e.py -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs
