name: Bug Report
description: Report a bug with the whatwatt integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us investigate.
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2024.12.0"
    validations:
      required: true
  - type: input
    id: integration-version
    attributes:
      label: whatwatt Integration Version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output from Home Assistant.
      render: text
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help.
